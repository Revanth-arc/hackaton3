---
image: python:3.12-bookworm

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  QUALITY_DEPENDENCIES: "black isort ruff mypy"

cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip

stages:
  - validate
  - quality
  - test
  - build

.python_job:
  before_script:
    - python --version
    - apt-get update
    - apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libgomp1
    - rm -rf /var/lib/apt/lists/*
    - python -m venv .venv
    - .venv/bin/python -m pip install --upgrade pip
    - .venv/bin/python -m pip install -r requirements.txt

metadata_check:
  stage: validate
  script:
    - test -f README.md
    - test -f LICENSE
    - test -f CHANGELOG.md
    - test -f CONTRIBUTING.md
    - test -f .gitignore
    - test -f .pre-commit-config.yaml
    - test -f .editorconfig
    - test -f requirements.txt

dependency_check:
  extends: .python_job
  stage: validate
  script:
    - .venv/bin/python -m pip check

yaml_lint:
  stage: validate
  script:
    - python -m venv .venv
    - .venv/bin/python -m pip install --upgrade pip
    - .venv/bin/python -m pip install yamllint
    - .venv/bin/python -m yamllint .gitlab-ci.yml .pre-commit-config.yaml

quality_checks:
  extends: .python_job
  stage: quality
  script:
    - .venv/bin/python -m pip install $QUALITY_DEPENDENCIES
    - .venv/bin/python -m black --check .
    - .venv/bin/python -m isort --check-only .
    - .venv/bin/python -m ruff check .
    - .venv/bin/python -m mypy .

security_scan:
  extends: .python_job
  stage: quality
  script:
    - .venv/bin/python -m pip install "bandit[toml]"
    - .venv/bin/python -m bandit -c pyproject.toml -r . -ll -f html -o bandit-report.html
    - .venv/bin/python -m bandit -c pyproject.toml -r . -ll
  artifacts:
    when: always
    paths:
      - bandit-report.html

unit_tests:
  extends: .python_job
  stage: test
  script:
    - .venv/bin/python -m pip install pytest
    - .venv/bin/python -m pytest --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml

build_verify:
  extends: .python_job
  stage: build
  script:
    - .venv/bin/python -c "import ai.extractor, database.sqlite, ocr.paddle_reader, streamlit; print('Build verification passed')"
